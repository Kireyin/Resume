<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alexandre Brispot — Resume</title>
  <meta name="description" content="Resume of Alexandre Brispot, Senior iOS Engineer.">
  <meta name="color-scheme" content="light dark">
  <script>
    // Apply the saved theme before paint to avoid a flash of the wrong theme.
    (function () {
      try {
        var p = localStorage.getItem("theme") || "auto";
        var dark = p === "dark" ||
          (p !== "light" && matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.dataset.theme = dark ? "dark" : "light";
      } catch (e) {}
    })();
  </script>
  <!-- Noto Sans TC is served in unicode-range subsets, so en/fr pages download no CJK glyphs -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="topbar" aria-label="Site controls">
    <div class="lang-switcher" id="lang-switcher" aria-label="Language"></div>
    <button class="theme-switch" id="theme-toggle" type="button" role="switch" aria-checked="false" aria-label="Dark mode" title="Toggle dark mode">
      <svg class="ico ico--sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="4"></circle>
        <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"></path>
      </svg>
      <span class="track"><span class="knob"></span></span>
      <svg class="ico ico--moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"></path>
      </svg>
    </button>
  </nav>

  <main class="resume" id="resume">
    <header class="resume-header">
      <h1 class="name" id="name"></h1>
      <p class="tagline" id="tagline"></p>
      <p class="actions">
        <a class="btn btn--secondary" id="contact" href="#" target="_blank" rel="noopener">
          <svg class="btn-ico" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M20.45 20.45h-3.56v-5.57c0-1.33-.02-3.04-1.85-3.04-1.85 0-2.14 1.45-2.14 2.94v5.67H9.34V9h3.42v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.46v6.28zM5.34 7.43a2.07 2.07 0 1 1 0-4.14 2.07 2.07 0 0 1 0 4.14zM7.12 20.45H3.55V9h3.57v11.45zM22.22 0H1.77C.79 0 0 .77 0 1.73v20.54C0 23.23.79 24 1.77 24h20.45c.98 0 1.78-.77 1.78-1.73V1.73C24 .77 23.2 0 22.22 0z"/>
          </svg>
          <span class="btn-label">LinkedIn</span>
        </a>
        <a class="btn btn--primary" id="pdf-link" href="#" download></a>
      </p>
    </header>

    <p class="summary" id="summary"></p>

    <section aria-labelledby="h-experience">
      <h2 id="h-experience"></h2>
      <div id="experience"></div>
    </section>

    <section aria-labelledby="h-education">
      <h2 id="h-education"></h2>
      <div id="education"></div>
    </section>

    <section aria-labelledby="h-skills">
      <h2 id="h-skills"></h2>
      <ul id="skills" class="plain-list"></ul>
    </section>

    <section aria-labelledby="h-languages">
      <h2 id="h-languages"></h2>
      <ul id="languages" class="plain-list"></ul>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
