name: Generate PDF

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  generatePDFResume:
    runs-on: ubuntu-latest
    container:
      image: pandoc/latex:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install CJK support
        run: tlmgr install xecjk
      - name: Generate PDF
        run: pandoc resume.md -o resume.pdf --pdf-engine=xelatex -s --variable papersize:"a4" --variable geometry:"margin=1in" --variable mainfont:"SF-Compact-Text-Regular.otf" --variable CJKmainfont:"Songti.ttc"
      - name: Commit
        run: |
          git config --local user.name Kireyin
          git config --local user.email kireyin@users.noreply.github.com
          git add .
          git commit -m "Generate PDF" -a || echo "No changes to commit"
      - name: Push
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
